<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photo Moments App</title>

    <!-- App CSS -->
    <link rel="stylesheet" href="css/style.css" />

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- APP SHELL -->
    <main class="app-shell">
      <!-- HEADER -->
      <header class="app-header">
        <p class="eyebrow">Cinematic Photography Journal</p>
        <h1>📸 Photo Moments</h1>
        <p class="header-text">
          Save your favorite shots, locations, lenses and field notes.
        </p>
      </header>

      <!-- FORM CARD -->
      <section class="form-card">
        <h2>Add New Moment</h2>

        <form id="moment-form">
          <input id="title-input" type="text" placeholder="Title" required />
          <input
            id="location-input"
            type="text"
            placeholder="Location e.g. Tromsø • Norway"
          />
          <input id="image-input" type="url" placeholder="Image URL" required />

          <select id="category-input">
            <option value="Aurora">Aurora</option>
            <option value="Street">Street</option>
            <option value="Snow">Snow</option>
            <option value="Reflection">Reflection</option>
            <option value="Portrait">Portrait</option>
            <option value="Rain">Rain</option>
          </select>

          <input
            id="lens-input"
            type="text"
            placeholder="Lens e.g. Viltrox 13mm"
          />
          <textarea
            id="notes-input"
            placeholder="Notes / camera settings"
          ></textarea>

          <button type="submit" class="primary-btn">Add Moment</button>
        </form>
      </section>

      <!-- GALLERY -->
      <section class="gallery-section">
        <div class="section-header">
          <h2>Gallery</h2>
          <span id="moment-count">0 moments</span>
        </div>

        <div class="gallery-grid" id="gallery-grid"></div>
      </section>
    </main>

    <!-- FULLSCREEN VIEWER -->
    <div class="photo-viewer" id="photo-viewer">
      <button class="viewer-close-btn" id="viewer-close-btn">×</button>

      <div class="viewer-content">
        <img id="viewer-image" src="" alt="" />

        <div class="viewer-info">
          <p id="viewer-location"></p>
          <h2 id="viewer-title"></h2>
          <span id="viewer-meta"></span>
          <p id="viewer-notes"></p>
        </div>
      </div>
    </div>

    <!-- MOBILE BOTTOM NAVIGATION -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-section="home">
        <span>🏠</span>
        <small>Home</small>
      </button>

      <button class="nav-item" data-section="gallery">
        <span>🖼️</span>
        <small>Gallery</small>
      </button>

      <button class="nav-item" data-section="favorites">
        <span>⭐</span>
        <small>Favorites</small>
      </button>

      <button class="nav-item" data-section="notes">
        <span>📝</span>
        <small>Notes</small>
      </button>

      <button class="nav-item" data-section="settings">
        <span>⚙️</span>
        <small>Settings</small>
      </button>
    </nav>

    <!-- App JS -->
    <script src="js/script.js"></script>
  </body>
</html>
