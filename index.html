<!doctype html>
<html lang="en">
  <head>
    <!-- Basic browser settings -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- App title -->
    <title>Photo Moments App</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css" />

    <!-- PWA -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#111827" />

    <!-- Icons -->
    <link rel="icon" href="icons/icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
  </head>

  <body>
    <!-- HEADER -->
    <header class="app-header">
      <h1>Photo Moments</h1>
      <p>Memories, settings and learning notes</p>

      <!-- Search -->
      <input type="text" id="searchInput" placeholder="Search moments..." />

      <!-- Sort + Install -->
      <div class="header-actions">
        <select id="sortSelect">
          <option value="newest">Newest</option>
          <option value="az">Title A–Z</option>
          <option value="za">Title Z–A</option>
          <option value="location">Location</option>
        </select>

        <button id="installBtn" class="install-btn" style="display: none">
          Install App
        </button>
      </div>
    </header>

    <!-- COLLECTION FILTERS -->
    <section class="collections-bar">
      <button class="collection-btn active" data-collection="moments">
        📸 Photo Moments
      </button>

      <button class="collection-btn" data-collection="learning">
        🧠 Learning Cards
      </button>
    </section>

    <!-- PHOTO GRID -->
    <main class="cards-container" id="cardsContainer"></main>

    <!-- FLOATING ADD BUTTON -->
    <button id="addCardBtn" class="fab" type="button">+</button>

    <!-- MODAL -->
    <div class="modal hidden" id="cardModal">
      <div class="modal-content">
        <!-- Modal header: title + close button -->
        <div class="modal-header">
          <h2 id="modalTitle">Add Photo Moment</h2>

          <button type="button" class="close-btn" id="closeModalBtn">×</button>
        </div>

        <!-- Splash screen -->
        <div id="splash">
          <img src="icons/icon-512.png" alt="Photo Moments" />
        </div>

        <!-- FORM: used for create and edit -->
        <form id="cardForm">
          <div class="form-group">
            <label for="imageInput">Photo</label>
            <input type="file" id="imageInput" accept="image/*" />
          </div>

          <div class="form-group">
            <label for="titleInput">Title</label>
            <input type="text" id="titleInput" required />
          </div>

          <div class="form-group">
            <label for="locationInput">Location</label>
            <input
              type="text"
              id="locationInput"
              placeholder="Tromsø, Frankfurt, Verona..."
            />
          </div>

          <div class="form-group">
            <label for="contentInput">Moment Notes</label>
            <textarea id="contentInput" rows="4" required></textarea>
          </div>

          <div class="form-group">
            <label for="settingsInput">Photo Settings</label>
            <textarea
              id="settingsInput"
              rows="3"
              placeholder="Nikon Z50 · 40mm · f/2.8 · 1/250s · ISO 200"
            ></textarea>
          </div>

          <div class="form-group">
            <label for="learningInput">Learning Note</label>
            <textarea
              id="learningInput"
              rows="3"
              placeholder="What did this photo teach you?"
            ></textarea>
          </div>

          <button type="submit" class="submit-btn">Save Moment</button>
        </form>
      </div>
    </div>

    <!-- JavaScript -->
    <script src="js/script.js"></script>
  </body>
</html>
